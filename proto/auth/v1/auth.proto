syntax = "proto3";

package auth.v1;

option go_package = "github.com/duynhlab/pkg/proto/auth/v1;authv1";

// AuthService is the internal (east-west) contract for session-token
// validation. It mirrors the HTTP route GET /auth/v1/private/me that every
// service's JWT middleware calls. The bearer token travels in gRPC metadata
// ("authorization"), not in the request body — use the pkg/grpcx helpers
// (WithAuthToken on the client, TokenFromContext on the server).
service AuthService {
  // GetMe validates the caller's session token (from metadata) and returns the
  // authenticated user. The server returns codes.Unauthenticated when the token
  // is missing, invalid, or expired.
  rpc GetMe(GetMeRequest) returns (GetMeResponse);
}

// GetMeRequest is intentionally empty: the token is carried in metadata.
message GetMeRequest {}

message GetMeResponse {
  User user = 1;
}

// User mirrors the /me JSON response shape 1:1.
message User {
  string id = 1;
  string username = 2;
  string email = 3;
}
