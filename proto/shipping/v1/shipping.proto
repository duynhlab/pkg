syntax = "proto3";

package shipping.v1;

option go_package = "github.com/duynhlab/pkg/proto/shipping/v1;shippingv1";

// ShippingService is the internal (east-west) contract for the shipping
// service. It mirrors the existing HTTP route
//   GET /shipping/v1/internal/orders/{order_id}
// used by order-service for order-details aggregation. This is the gRPC
// Phase 1 pilot path (see homelab/docs/api/grpc-internal-comms.md).
service ShippingService {
  // GetShipmentByOrder returns the shipment for an order. The response
  // shipment is unset when no shipment exists for the order yet (the HTTP
  // route returns a null shipment in that case).
  rpc GetShipmentByOrder(GetShipmentByOrderRequest) returns (GetShipmentByOrderResponse);

  // CreateShipment creates a shipment for an order (step 2 of the
  // order-fulfillment saga). Idempotent by order_id: a repeat call returns the
  // existing shipment rather than creating a duplicate, so a Temporal activity
  // retry is safe.
  rpc CreateShipment(CreateShipmentRequest) returns (CreateShipmentResponse);

  // CancelShipment cancels the shipment for an order (the saga compensation for
  // CreateShipment). Idempotent: cancelling an already-cancelled or
  // non-existent shipment succeeds, so compensation is safe to retry.
  rpc CancelShipment(CancelShipmentRequest) returns (CancelShipmentResponse);
}

message GetShipmentByOrderRequest {
  string order_id = 1;
}

message GetShipmentByOrderResponse {
  // Unset when the order has no shipment yet.
  Shipment shipment = 1;
}

message CreateShipmentRequest {
  string order_id = 1;
  // Free-form destination address carried from the order. The shipping service
  // generates the tracking number / carrier itself.
  string address = 2;
}

message CreateShipmentResponse {
  Shipment shipment = 1;
}

message CancelShipmentRequest {
  string order_id = 1;
}

message CancelShipmentResponse {}

// Shipment mirrors the shipping service's JSON shipment shape 1:1 so the gRPC
// and HTTP paths produce identical aggregated responses. Timestamps are the
// service's preformatted RFC3339 strings (empty when unset) rather than
// google.protobuf.Timestamp, to avoid parse/format round-tripping that could
// change the wire value.
message Shipment {
  string id = 1;
  string order_id = 2;
  string tracking_number = 3;
  string carrier = 4;
  string status = 5;
  string estimated_delivery = 6;
  string created_at = 7;
  string updated_at = 8;
}
