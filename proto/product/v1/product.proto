syntax = "proto3";

package product.v1;

option go_package = "github.com/duynhlab/pkg/proto/product/v1;productv1";

// ProductService is the internal (east-west) contract for the product service.
// It exposes inventory operations used by the order-fulfillment saga
// (see homelab/docs/api/temporal-order-fulfillment.md). These close
// the long-standing inventory TODO in the synchronous checkout path.
service ProductService {
  // ReserveStock atomically decrements stock for every line item (step 1 of the
  // saga). It is all-or-nothing: if any item has insufficient stock, nothing is
  // reserved and the call fails with FAILED_PRECONDITION. Idempotent by
  // reservation_id (the order ID) so a Temporal activity retry does not
  // double-decrement.
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);

  // ReleaseStock returns previously reserved stock (the saga compensation for
  // ReserveStock). Idempotent by reservation_id: releasing an unknown or
  // already-released reservation succeeds, so compensation is safe to retry.
  rpc ReleaseStock(ReleaseStockRequest) returns (ReleaseStockResponse);

  // GetProducts is a batch price/availability read used by checkout
  // re-validation (RFC-0015): product is the price authority at checkout
  // time. Read-only; the response omits unknown ids rather than erroring.
  rpc GetProducts(GetProductsRequest) returns (GetProductsResponse);

  // BatchGetCurrentPrices is the price-only successor to GetProducts
  // (RFC-0021: availability moves to inventory.v1). DB-truth — it bypasses
  // the browsing cache like GetProducts does. Read-only; the response omits
  // unknown SKUs rather than erroring. GetProducts stays untouched until its
  // callers migrate (expand → migrate → contract).
  rpc BatchGetCurrentPrices(BatchGetCurrentPricesRequest) returns (BatchGetCurrentPricesResponse);
}

// StockItem is a single product/quantity pair within a reservation.
message StockItem {
  string product_id = 1;
  int32 quantity = 2;
}

message ReserveStockRequest {
  // Idempotency key for the reservation — the order ID. Repeated ReserveStock
  // calls with the same reservation_id reserve at most once.
  string reservation_id = 1;
  repeated StockItem items = 2;
}

message ReserveStockResponse {}

message ReleaseStockRequest {
  string reservation_id = 1;
  repeated StockItem items = 2;
}

message ReleaseStockResponse {}

// --- RFC-0015 additions: checkout re-validation reads ---

// GetProductsRequest asks for a batch of products by id.
message GetProductsRequest {
  repeated string product_ids = 1;
}

// ProductInfo is the price/availability view checkout validates against.
message ProductInfo {
  string product_id = 1;
  string name = 2;
  // price_minor is the current catalog unit price in int64 minor units — the
  // platform money representation (RFC-0010 P3). The catalog's float price is
  // rounded to cents at this boundary, once, by the product server.
  int64 price_minor = 3;
  int32 available_qty = 4;
}

// GetProductsResponse contains only the requested ids that exist; callers
// treat a missing id as "product gone" and fail their validation.
message GetProductsResponse {
  repeated ProductInfo products = 1;
}

// --- RFC-0021 additions: price-only checkout reads ---

// BatchGetCurrentPricesRequest asks for current prices by SKU. sku_id matches
// inventory.v1 identity (one product = one SKU initially, sku_id = product id).
message BatchGetCurrentPricesRequest {
  repeated string sku_ids = 1;
}

// CurrentPrice is the price-only view checkout validates against; it carries
// no stock fields by design.
message CurrentPrice {
  string sku_id = 1;
  // Display-name snapshot for session line items.
  string name = 2;
  // Current catalog unit price in int64 minor units (RFC-0010 P3), rounded
  // once at the product boundary.
  int64 price_minor = 3;
  // ISO-4217, e.g. "USD".
  string currency = 4;
  // False when the catalog no longer sells this SKU (unpublished/archived);
  // checkout fails validation on it just like a missing SKU.
  bool sellable = 5;
}

// BatchGetCurrentPricesResponse contains only the requested SKUs that exist;
// callers treat a missing SKU as "product gone" and fail their validation.
message BatchGetCurrentPricesResponse {
  repeated CurrentPrice prices = 1;
}
