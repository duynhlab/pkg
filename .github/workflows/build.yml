name: Build

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read # sonarqube.yml's job requests this; a reusable workflow can't exceed the caller's grant

jobs:
  go-check:
    uses: duynhlab/gha-workflows/.github/workflows/go-check.yml@main
    with:
      command-test: 'go test -race -coverprofile=coverage.out ./...'
      lint: true
    secrets: inherit

  sonar:
    needs: go-check
    uses: duynhlab/gha-workflows/.github/workflows/sonarqube.yml@main
    with:
      project-key: 'duynhlab_pkg'
      organization: 'duynhlab'
      fail-on-quality-gate: false
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
