name: Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read # sonarqube.yml's job requests this; a reusable workflow can't exceed the caller's grant

jobs:
  go-check:
    uses: duynhlab/gha-workflows/.github/workflows/go-check.yml@812bbdb2b2138dec0a48b50fcdb3ef437aca870b # main
    with:
      command-test: 'go test -race -coverprofile=coverage.out ./...'
      lint: true

  # Protobuf contract checks for the gRPC modules under proto/.
  # Lints the .proto style and fails the PR on a backward-incompatible change.
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          lint: true
          format: true
          breaking: true
          breaking_against: 'https://github.com/duynhlab/pkg.git#branch=main'
          # Don't post a PR comment: it needs pull-requests:write (and fails on
          # fork PRs). The lint/format/breaking checks still gate the PR.
          pr_comment: false

  sonar:
    needs: go-check
    uses: duynhlab/gha-workflows/.github/workflows/sonarqube.yml@812bbdb2b2138dec0a48b50fcdb3ef437aca870b # main
    with:
      project-key: 'duynhlab_pkg'
      organization: 'duynhlab'
      fail-on-quality-gate: false
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
